<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUGeeks | Feed</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/feed.css">
    <script src="js/utils.js" defer></script>
    <script src="js/storage.js" defer></script>
    <script src="js/feed.js" defer></script>
    <script src="https://kit.fontawesome.com/803ffdcfd8.js" crossorigin="anonymous"></script>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2 class="sidebar-title">Technical Forum</h2>
            <span class="sidebar-subtitle">For All Geeks</span>
        </div>

        <nav class="sidebar-nav">
            <a href="feed.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Home
            </a>
            <a href="explore.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                Explore
            </a>
            <a href="profile.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Profile
            </a>
            <a href="trending.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                    <polyline points="17 6 23 6 23 12" />
                </svg>
                Popular
            </a>
            <a href="#" id="logout-btn" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Logout
            </a>
        </nav>
    </aside>

    <main class="feed-main">
        <header class="feed-topbar">
            <span class="topbar-logo">QUGeeks</span>
        </header>

        <div class="feed-content">
            <section class="composer-card">
                <form id="post-form" class="post-form" novalidate>
                    <div class="composer-top">
                        <div id="composer-avatar" class="avatar-placeholder"></div>
                        <textarea id="post-content" name="post-content" rows="4" placeholder="What's on your mind?"
                            maxlength="280"></textarea>
                    </div>

                    <p id="post-error" class="form-error" aria-live="polite"></p>

                    <div class="composer-actions">
                        <div class="composer-icons">
                            <i class="fa-regular fa-image"></i>
                            <i class="fa-solid fa-paperclip"></i>
                            <i class="fa-solid fa-hashtag"></i>
                        </div>
                        <button type="submit" class="post-btn">Post</button>
                    </div>
                </form>
            </section>
            <section class="posts-section">
                <div id="posts-container" class="posts-container"></div>
            </section>
        </div>
    </main>

    <div id="post-modal" class="post-modal" hidden>
        <div id="post-modal-overlay" class="post-modal-overlay"></div>
        <section class="post-modal-card" aria-modal="true" aria-labelledby="post-modal-title" role="dialog">
            <button id="close-post-modal" class="close-post-modal" type="button" aria-label="Close post detail">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="post-modal-header">
                <div id="modal-post-avatar" class="post-avatar"></div>
                <div class="post-meta">
                    <p id="modal-post-username" class="post-username"></p>
                    <p id="modal-post-date" class="post-date"></p>
                </div>
            </div>
            <p id="post-modal-title" class="post-modal-content"></p>
            <hr class="post-divider">
            <div id="modal-comments" class="modal-comments"></div>
            <form id="comment-form" class="comment-form" novalidate>
                <p id="comment-error" class="form-error" aria-live="polite"></p>
                <div class="comment-form-row">
                    <textarea id="comment-content" name="comment-content" rows="3"
                        placeholder="Add to the archive..."></textarea>
                    <button type="submit" class="post-btn">Submit</button>
                </div>
            </form>
        </section>
    </div>
</body>

</html>
