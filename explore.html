<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUGeeks | Explore</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/explore.css">
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/explore.js" defer></script>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2 class="sidebar-title">Technical Forum</h2>
            <span class="sidebar-subtitle">For All Geeks</span>
        </div>
        <nav class="sidebar-nav">
            <a href="feed.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Home
            </a>
            <a href="explore.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                Explore
            </a>
            <a href="profile.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />

                Profile
            </a>
            <a href="#" id="logout-btn" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Logout
            </a>
        </nav>
    </aside>

    <main class="explore-main">
        <header class="explore-topbar">
            <span class="topbar-logo">QUGeeks</span>
        </header>

        <section class="explore-content">
            <div class="explore-header">
                <h1 class="explore-title">Explore the <span class="highlight">Network</span></h1>
                <p class="explore-description">
                    Discover researchers, engineers, and scholars within the Qatar University technical
                    ecosystem. Expand your academic reach.
                </p>
            </div>

            <div id="profiles-grid" class="profiles-grid">
            </div>
        </section>
    </main>

</html>
