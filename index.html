<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUGeeks | Login</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js" defer></script>
</head>

<body>
    <main class="auth-page">
        <header class="auth-header">
            <img class="auth-logo" src="assets/images/logo.png" alt="QUGeeks">
        </header>
        <section class="login-card">

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="username@qu.edu.qa" autocomplete="email"
                        required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="*********"
                        autocomplete="current-password" required>
                </div>
                <p id="login-error" class="form-error" aria-live="polite"></p>
                <button type="submit">Login →</button>
                <p class="register">
                    Don't have an account?
                    <a id="register-page" href="register.html">Register</a>
                </p>
            </form>
        </section>
    </main>
</body>

</html>
