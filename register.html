<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUGeeks | Register</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="js/utils.js" defer></script>
    <script src="js/storage.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>


<body>
    <main class="auth-page">

        <section class="register-card">
            <header class="auth-header">
                <img class="auth-logo" src="assets/images/register-logo.png" alt="QUGeeks">
            </header>

            <div class="auth-intro">
                <h1>Create Account</h1>
                <p class="auth-description">Join the technical archive. Please provide your institutional credentials to
                    begin.</p>
            </div>

            <form id="register-form" class="register-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" placeholder="j.doe_2024" autocomplete="username"
                        required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="username@qu.edu.qa" autocomplete="email"
                        required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="*********"
                        autocomplete="new-password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" name="confirm-password" id="confirm-password" placeholder="*********"
                        autocomplete="new-password" required>
                </div>
                <p id="register-error" class="form-error" aria-live="polite"></p>
                <button type="submit">Create Account →</button>
                <p class="register">
                    Already have an account?
                    <a id="login-page" href="index.html">Login</a>
                </p>
            </form>
        </section>
    </main>
</body>


</html>
