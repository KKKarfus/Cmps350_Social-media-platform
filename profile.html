<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUGeeks | Profile</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Lato:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/profile.css">
    
    
</head>

<body>
    
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2 class="sidebar-title">Technical Forum</h2>
            <span class="sidebar-subtitle">For All Geeks</span>
        </div>
        <nav class="sidebar-nav">
            <a href="feed.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Home
            </a>
            <a href="explore.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                Explore
            </a>
            <a href="profile.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Profile
            </a>

            <a href="index.html" id="logout-btn" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Logout
            </a>
        </nav>
    </aside>

    <main class="profile-main">
        <header class="profile-topbar">
            <span class="topbar-logo">QUGeeks</span>
        </header>
        

        <div class="profile-content"> 
    <section class="profile-header">
        
    <div class="avatar-circle" id="profile-avatar"></div>
    
    


    <div class="profile-details">
        <div class="profile-top">
            <h1 id="profile-username">remove later</h1>
            <div class="buttons">
            <button id="edit-profile-btn" class="btn-outline">
                Edit Profile
            </button>
            <button id="follow-btn" class="btn-primary">
                Follow
            </button>
            </div>
        </div>
        <p id="profile-bio" class="profile-bio">remove me later </p>
        <hr class="divider">
        <div class="profile-stats">
            <div class="stat">
                <span id="posts-count">0</span>
                <label>Posts</label>
            </div>
            <div class="stat">
                <span id="following-count">0</span>
                <label>Following</label>
            </div>
            <div class="stat">
                <span id="followers-count">0</span>
                <label>Followers</label>
            </div>
        </div>
    </div>

</section>

<section class="profile-posts">
    <h2>Posts</h2>
    <div id="profile-posts-container">
    </div>
</section>
<hr class="divider">

    <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <h2>Edit Profile</h2>
            <button id="close-edit-modal" class="btn-close">✕</button>
        </div>
        <div class="modal-body">
            <label>Username</label>
            <input type="text" id="edit-username" placeholder="Username">
            <label>Bio</label>
            <textarea id="edit-bio" placeholder="Tell us about yourself..."></textarea>
        </div>
        <div class="modal-footer">
            <button id="save-profile-btn" class="btn-primary">Save</button>
        </div>
    </div>
    </div>
</div>



    </main>


    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/profile.js" defer></script>
</body>

</html>
